trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'



steps:
# Checkout source code
- checkout: self
  fetchDepth: "0"

- bash: |
    git diff --name-only HEAD~1 HEAD > changed_files.txt
    if grep -q "^lambda1/" changed_files.txt; then
      echo "##vso[task.setvariable variable=lambda1Changed]true"
    fi

    if grep -q "^lambda2/" changed_files.txt; then
      echo "##vso[task.setvariable variable=lambda2Changed]true"
    fi

    cat changed_files.txt

    echo "##[section]Detected changes in the following files:"
  displayName: 'Detect Changed Files'

# Display environment information
- script: |
    echo "Building application..."
    echo "Branch: $(Build.SourceBranchName)"
  displayName: 'Print Build Info'

# Example build step
- script: |
    echo "Run build commands here"
  displayName: 'Build'

# Example test step
- script: |
    echo "Run tests here"
  displayName: 'Test'

# Publish artifacts
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.SourcesDirectory)'
    ArtifactName: 'drop'
  displayName: 'Publish Artifacts'
